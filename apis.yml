  - url: https://docs.phantom.com/sui/getting-started-with-sui
    type: Documentation
  description: Sui provider exposed via window.phantom for browser and mobile platforms, offering connect,
    signTransactionBlock, and signMessage methods so Sui dApps can integrate Phantom alongside their existing
    EVM/Solana flows.
- aid: phantom:phantom-deeplinks-api
  name: Phantom Deeplinks API
  tags:
  - Android
  - Deeplinks
  - Encryption
  - iOS
  - Mobile
  - Sessions
  - Solana
  - Universal Links
  humanURL: https://docs.phantom.com/phantom-deeplinks/deeplinks-ios-and-android
  baseURL: https://phantom.app/ul/v1
  properties:
  - url: https://docs.phantom.com/phantom-deeplinks/deeplinks-ios-and-android
    type: Documentation
  - url: https://docs.phantom.com/phantom-deeplinks/handling-sessions
    type: Documentation
  - url: https://docs.phantom.com/phantom-deeplinks/specifying-redirects
    type: Documentation
  - url: https://docs.phantom.com/phantom-deeplinks/encryption
    type: Documentation
  - url: https://docs.phantom.com/phantom-deeplinks/limitations
    type: Documentation
  description: Universal Link (https://phantom.app/ul/v1/<method>) and custom protocol (phantom://v1/<method>)
    deeplinks for iOS and Android lets mobile dApps trigger Phantom for connect, disconnect, signMessage,
    signTransaction, signAllTransactions, signAndSendTransaction, and browse (open URL in the in-app browser).
    Uses an X25519 / TweetNaCl box encryption handshake with shared-secret-encrypted payloads and a returned
    session token. Currently scoped to Solana. Universal Links are the recommended scheme.
