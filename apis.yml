description: Phantom is a self-custodial multi-chain crypto wallet for Solana, Ethereum, Polygon, Base, Bitcoin,
  Sui, Monad, and HyperEVM, distributed as a mobile app (iOS/Android) and browser extension with more than 20
  million users. For developers, Phantom exposes injected Provider APIs per chain on window.phantom (Solana, EVM,
  Bitcoin, Sui) following the Wallet Standard and EIP-1193, a Universal Link / phantom:// Deeplinks API for
  mobile dApp integration with encrypted session handshakes, a multi-platform Connect SDK suite (React, React
  Native, Browser SDKs) with embedded wallet support and OAuth social login (Google, Apple), and a Phantom MCP
  Server that exposes 27 tools across wallet operations, swaps, portfolio rebalancing, and Hyperliquid
  perpetuals for AI agents — each agent receives its own wallet via device-code authentication. Apps register
  through the Phantom Portal to obtain an App ID, configure redirect URLs, verify domains, and opt into
  auto-confirm contracts.
