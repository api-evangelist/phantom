    type: Documentation
  - url: https://docs.phantom.com/developer-powertools/solana-actions-and-blinks
    type: Documentation
  description: Solana wallet provider injected at window.phantom.solana exposing connect, disconnect, signMessage,
    signIn (Sign-In With Solana), signTransaction, signAllTransactions, and signAndSendTransaction. Implements
    the Solana Wallet Standard so dApps can also integrate through @solana/wallet-adapter. Supports versioned
    transactions, priority fees, Token-2022 extensions, and Solana Actions & Blinks. Emits connect, disconnect,
    and accountChanged events; exposes isPhantom, publicKey, and isConnected properties.
- aid: phantom:phantom-evm-provider-api
  name: Phantom EVM Provider API
  tags:
  - Base
  - EIP-1193
  - Ethereum
  - EVM
  - HyperEVM
  - Monad
  - Polygon
  - Provider
  - Wallet
  humanURL: https://docs.phantom.com/ethereum-monad-testnet-base-and-polygon/provider-api-reference
  properties:
  - url: https://docs.phantom.com/ethereum-monad-testnet-base-and-polygon/provider-api-reference
    type: Documentation
  description: EIP-1193 compliant Ethereum Provider API injected at window.ethereum and window.phantom.ethereum
    for Ethereum, Polygon, Base, Monad testnet, and HyperEVM. Supports the full Ethereum RPC surface for
    connecting accounts, reading chain state, signing messages and typed data, sending transactions, switching
    and adding chains, and watching assets. Emits standard accountsChanged, chainChanged, connect, and
    disconnect events.
- aid: phantom:phantom-bitcoin-provider-api
  name: Phantom Bitcoin Provider API
  tags:
  - Bitcoin
  - Ordinals
  - PSBT
  - Provider
  - SegWit
  - Taproot
  - Wallet
  humanURL: https://docs.phantom.com/bitcoin/provider-api-reference
  properties:
  - url: https://docs.phantom.com/bitcoin/provider-api-reference
    type: Documentation
  description: Bitcoin provider injected at window.phantom.bitcoin exposing requestAccounts (returning BtcAccount
    objects with address, publicKey, addressType, and purpose), signMessage, and signPSBT for partially signed
    Bitcoin transactions. Supports Taproot (p2tr), SegWit (p2wpkh), p2sh, and p2pkh address types and
    distinguishes payment vs. ordinals purposes. Emits accountsChanged events. The window.phantom.bitcoin
    provider is scheduled for deprecation in an upcoming release.
- aid: phantom:phantom-sui-provider-api
  name: Phantom Sui Provider API
  tags:
  - Move
