  humanURL: https://docs.phantom.com/solana/integrating-phantom
  properties:
  - url: https://docs.phantom.com/solana/integrating-phantom
    type: Documentation
  - url: https://docs.phantom.com/developer-powertools/wallet-standard
    type: Documentation
  - url: https://docs.phantom.com/developer-powertools/sign-in-with-standards
